  affects:
  - see dependency audit / module downstream reads
  interpretation: Qualitative internal state for ADH water retention index; empirical and scenario-dependent.
  validation_status: internal plausibility only; not externally validated
  assumption_level: moderate
  clinical_use: not for clinical decision support
  numeric_range:
    hard:
    - 0.0
    - 1.0
    expected:
    - 0.0
    - 1.0
    note: unitless qualitative score/index, expected to remain within 0-1
  reviewer_guidance:
