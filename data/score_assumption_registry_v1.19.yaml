version: v1.19
purpose: Hardened registry of qualitative scores, proxies, risk indices and modifiers with numeric audit ranges and expert-review
  metadata.
public_release_note: Updated in v1.20 to include adaptive V/Q dispersion audit fields; registry remains a transparency layer,
  not clinical validation.
derived_from: score_assumption_registry_v0.41.yaml plus v1.08-v1.18 public extensions
required_fields:
- variable
- module
- kind
- range
- formula_status
- inputs
- affects
- interpretation
- validation_status
- assumption_level
- clinical_use
numeric_range_policy:
  hard: Absolute software sanity range; values outside this range indicate a likely bug or missing clamp.
  expected: Broad expected range used for reviewer triage, not a clinical target.
  missing_variable: Scenario-level absence is reported as NOT_PRESENT, not a failure.
entries:
