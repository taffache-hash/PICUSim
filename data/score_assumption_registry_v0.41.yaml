version: v0.41
purpose: Registry of qualitative scores, proxies, risk indices and modifiers used
  by the Pediatric in-silico physiology simulator.
required_fields:
- variable
- module
- kind
- range
- formula_status
- inputs
- affects
- interpretation
- validation_status
- assumption_level
- clinical_use
