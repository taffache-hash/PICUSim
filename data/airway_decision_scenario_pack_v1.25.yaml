version: v1.25-alpha
purpose: Airway decision scenario pack for educational debriefing; no engine changes beyond v1.24 event
  system.
scenario_count: 6
scenarios:
- id: airway_failed_intubation_cannot_oxygenate_v1_25
  path: scenarios/airway_failed_intubation_cannot_oxygenate_v1_25.yaml
  decision_focus:
  - recognize failed oxygenation
  - avoid fixation on repeated attempts
  - start rescue ventilation
  - secure airway after rescue
  critical_events:
  - failed_intubation_attempt
  - failed_intubation_attempt
  - laryngospasm
  - start_bag_mask_ventilation
  - perform_intubation
  expected_final_state: secured_ETT
  key_outputs:
  - airway_interface
  - oxygen_interface
  - intubated
  - ventilator_connected
  - airway_pressure_delivery_enabled
  - airway_event_type
  - airway_event_status
  - airway_rescue_state
  - intubation_attempt_count
  - failed_intubation_count
  - intubation_success_time_s
  - extubation_time_s
  debrief_questions:
  - Which variables mark transition from hypoxic respiratory failure to failed airway?
  - How many failed attempts occurred before rescue ventilation?
  - Did oxygenation support begin before the airway was finally secured?
