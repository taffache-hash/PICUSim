name: picu_piperacillin_tazobactam_sepsis_v1_17
version: v1.17-alpha
category: infection_pkpd
summary: >
  Educational sepsis scenario linking piperacillin/tazobactam exposure, qualitative fT>MIC,
  antimicrobial coverage and infection-response dynamics. Not for clinical dosing.

patient:
  profile: child_20kg
  age_y: 6
  weight_kg: 20
  sex: M
  diagnosis: abdominal_sepsis_beta_lactam_pkpd

respiratory:
  mode: PCV
  PEEP: 6
  Paw: 18
  FiO2: 0.40
  RR: 28
  C_rs: 0.8
  R_rs: 8
  PaO2: 82
  PaCO2: 41
  SaO2: 0.95

cardiovascular:
  HR: 145
  MAP: 58
  CO: 4.8
  CVP: 7
  Hb: 10.2

metabolism:
  T_core: 39.0
  lactate: 3.2
  VO2: 150

sepsis:
  phenotype: warm
  infection_load: 0.72
  source_control: 0.30
  antibiotic_effect: 0.0

infection:
  microbial_burden: 0.72
  pathogen_virulence: 0.68
  pathogen_resistance_index: 0.22
  source_control: 0.30
  antibiotic_started: false
  antibiotic_coverage: 0.0
  culture_drawn: true
  infection_focus: abdominal

renal:
  creatinine_mg_dL: 0.55
  creatinine_baseline_mg_dL: 0.35
  CRRT_active: false
  CRRT_effluent_mL_kg_h: 0

drugs:
  norad_mcg_kg_min: 0.08
  piperacillin_mg_kg_h: 0.0
  piperacillin_MIC_mg_L: 8.0

perturbations:
  - {t: 120, action: set_piptazo, value: 12.5, label: "start piperacillin/tazobactam infusion"}
  - {t: 420, action: set_source_control, value: 0.65, label: "source control improves"}
  - {t: 600, action: set_piptazo, value: 18.0, label: "increase beta-lactam exposure"}

outputs:
  - C_piperacillin_mg_L
  - piperacillin_MIC_mg_L
  - piperacillin_ft_above_MIC
  - piperacillin_target_attainment
  - piperacillin_kill_signal
  - piperacillin_coverage_mod
  - piperacillin_renal_clearance_factor
  - antibiotic_started
  - antibiotic_coverage
  - antibiotic_effect
  - microbial_burden
  - infection_load
  - antimicrobial_kill_rate
  - infection_resolution_rate
  - inadequate_coverage_index
  - infection_severity_score
  - lactate
  - MAP
  - HR
  - pk_supported_drug_count
  - pk_extension_revision

simulation_time_s: 900
