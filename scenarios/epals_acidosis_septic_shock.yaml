perturbations:
- t: 60
  action: fluid_bolus_mL
  value: 220
  label: 10 mL/kg balanced resuscitation proxy
- t: 90
  action: set_norad
  value: 0.15
  label: start norepinephrine
- t: 120
  action: set_piptazo
  value: 12.0
  label: start broad-spectrum beta-lactam proxy
- t: 180
  action: set_antibiotic_effect
  value: 0.35
  label: early antimicrobial effect
- t: 240
  action: set_source_control
  value: 0.35
  label: partial source control
- t: 300
  action: set_bicarbonate
  value: 12
  label: cautious buffer proxy after perfusion work
expected_response:
- pH/HCO3 are lowest during shock and improve gradually when perfusion/source control improves.
- Lactate stabilizes before full normalization.
debrief_questions:
- Was the acidosis respiratory, metabolic or mixed?
- Which intervention addressed the cause rather than just the pH?
outputs:
- pH_a
- HCO3_mmol_L
- base_excess_mmol_L
- anion_gap_mmol_L
- lactate
- PaCO2
- RR
- MAP
- CO
- infection_severity_score
- antibiotic_effect
- piperacillin_target_attainment
limitations:
- Educational scenario for emergency physiology training only.
- Not calibrated for patient-specific prediction or clinical decision support.
- Intervention events are simplified proxies for physiology reversal, not treatment protocols.
simulation_time_s: 420
