name: epals_acidosis_septic_shock
version: v1.22.1-alpha
category: epals_5h_acidosis
epals:
  group: H
  cause: hydrogen_ion_acidosis
  reversible_cause: Hydrogen ion / metabolic acidosis
  teaching_level: intermediate
clinical_narrative: Seven-year-old child with septic/hypoperfusion metabolic acidosis. The scenario frames acidosis
  as a sign of impaired perfusion and source control, not as an isolated number.
