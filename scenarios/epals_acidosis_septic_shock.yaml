  PEEP: 7
  Paw: 22
  FiO2: 0.55
  RR: 34
  C_rs: 0.75
  R_rs: 10.0
  PaO2: 72.0
  PaCO2: 32.0
  SaO2: 0.92
  non_recruitable_frac: 0.15
ventilator:
  mode: PCV
  Pinsp: 15
  IE_ratio: 0.35
  alarm_Ppeak_max: 40
cardiovascular:
  HR: 158
  MAP: 48
  CO: 4.0
  CVP: 4
  Hb: 9.5
  preload_mod: 0.75
metabolism:
  T_core: 39.3
  T_setpoint: 39.4
  VO2: 190
  lactate: 6.5
  SIRS_factor: 1.45
sepsis:
  phenotype: warm
  infection_load: 0.85
  source_control: 0.0
