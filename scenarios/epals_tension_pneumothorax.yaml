name: epals_tension_pneumothorax
version: v1.22.2-alpha
category: epals_5t_tension_pneumothorax
epals:
  group: T
  cause: tension_pneumothorax
  reversible_cause: Tension pneumothorax
  teaching_level: intermediate
clinical_narrative: 'Four-year-old mechanically ventilated child with sudden unilateral ventilation failure physiology:
  rising airway pressure/resistance, V/Q mismatch, increasing RV afterload, hypotension and hypoxaemia. Decompression
  is represented by simplified physiology reversal.'
patient:
  profile: child_20kg
  age_y: 4
  weight_kg: 16
  sex: M
  diagnosis: epals_tension_pneumothorax
respiratory:
  mode: PCV
  PEEP: 6
  Paw: 22
  FiO2: 0.55
  RR: 30
  C_rs: 0.65
  R_rs: 10.0
  PaO2: 70.0
  PaCO2: 42.0
  SaO2: 0.92
  non_recruitable_frac: 0.18
ventilator:
  mode: PCV
  Pinsp: 16
  IE_ratio: 0.35
  T_rise_s: 0.06
  alarm_Ppeak_max: 45
cardiovascular:
  HR: 145
  MAP: 58
  CO: 2.8
  CVP: 7
  PAP_mean: 22
  Hb: 11.0
  preload_mod: 0.7
metabolism:
  T_core: 37.4
  VO2: 135
  lactate: 2.5
events:
- t: 70
  name: pneumothorax
  severity: tension
  label: tension pneumothorax deterioration
perturbations:
- t: 140
  action: set_FiO2
  value: 0.95
  label: high-concentration oxygen
- t: 170
  action: airway_shunt_add
  value: 0.03
  label: 'needle decompression proxy: shunt reduced'
- t: 170
  action: RV_afterload_index
  value: 0.18
  label: 'needle decompression proxy: RV afterload improves'
- t: 170
  action: CVP
  value: 8.0
  label: 'needle decompression proxy: CVP improves'
- t: 170
  action: MAP
  value: 60.0
  label: 'needle decompression proxy: MAP recovers'
- t: 170
  action: CO
  value: 3.2
  label: 'needle decompression proxy: venous return improves'
- t: 210
  action: set_FiO2
  value: 0.7
  label: post-decompression oxygen wean
- t: 240
  action: set_PEEP
  value: 6.0
  label: return to baseline PEEP
expected_response:
- Acute fall in oxygenation and haemodynamics after tension physiology.
- Improvement in MAP/CO and V/Q indices after decompression proxy.
debrief_questions:
- Which variables suggest obstructive shock rather than isolated lung disease?
- Why do CVP/RV afterload and oxygenation move together here?
outputs:
- SaO2
- PaO2
- PaCO2
- MAP
- CO
- CVP
- PVR
- RV_afterload_index
- vq_shunt_frac
- vq_deadspace_frac
- Ppeak
- R_rs
- C_rs
- alarm_active
limitations:
- Educational scenario for emergency physiology training only.
- Not calibrated for patient-specific prediction or clinical decision support.
- Intervention events are simplified physiology proxies for reversible-cause teaching, not treatment protocols.
simulation_time_s: 360
