expected_response:
- Sedation/toxin physiology increases PaCO2 and depresses consciousness.
- Stopping exposure plus ventilatory support improves oxygenation and CO2 trend.
debrief_questions:
- Was hypoxaemia primary or secondary to hypoventilation?
- Which trace shows respiratory depression before circulatory collapse?
