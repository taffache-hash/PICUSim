- PaCO2
- SaO2
- PaO2
- pH_a
- drive_level
- Pmus
- sedation_score
- opioid_resp_depression
- GCS_proxy
- MAP
- HR
- C_fentanyl_ng_mL
- C_midazolam_ng_mL
limitations:
- Educational scenario for emergency physiology training only.
- Not calibrated for patient-specific prediction or clinical decision support.
- Intervention events are simplified physiology proxies for reversible-cause teaching, not treatment protocols.
- Specific antidote pharmacology is not implemented; reversal is represented by exposure removal and ventilation
  support.
