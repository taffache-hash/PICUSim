clinical_narrative: A school-age child with obstructive hypercapnic respiratory failure is supported with non-invasive bilevel ventilation. The scenario verifies pressure-support delivery through a mask rather than an endotracheal tube.
debrief_questions:
- Which variables show that bilevel NIV is active but the child is not intubated?
- What is the effect of IPAP/EPAP and leak on delivered pressure?
- Which markers would prompt escalation to intubation in a future airway-event scenario?
