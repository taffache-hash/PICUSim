clinical_narrative: A child develops unstable wide-complex tachycardia with a pulse. Learners should recognize that this is not pulseless arrest, avoid asynchronous defibrillation as the primary action, and use synchronized cardioversion with adequate energy.
decision_focus:
  - identify pulse presence despite unstable rhythm
  - distinguish pulsed unstable VT from pulseless VT/VF
  - choose synchronized cardioversion
  - recognize inadequate cardioversion energy
  - reassess perfusion after conversion
debrief_questions:
  - Was a pulse checked before shock choice?
  - Was the rhythm treated as pulsed unstable tachycardia?
  - Was synchronized cardioversion selected?
  - Was shock energy adequate for weight?
  - Did perfusion improve after conversion?
