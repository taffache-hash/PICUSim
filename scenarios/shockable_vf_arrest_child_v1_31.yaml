  VO2: 145
  lactate: 2.0
  pH_a: 7.34
perturbations:
  - t: 55
    action: set_lactate
    value: 4.2
    label: early low-flow lactate rise
  - t: 55
    action: set_pH_a
    value: 7.22
    label: early arrest acidosis
cardiac_events:
  - t: 60
    name: induce_vf
    cause: primary arrhythmia
    label: sudden VF arrest
clinical_narrative: A child develops sudden VF arrest. Learners should recognize a shockable rhythm, start compressions, choose appropriate unsynchronized defibrillation energy, consider amiodarone in shockable arrest context and transition to post-ROSC stabilization after successful shock.
decision_focus:
  - identify VF as shockable cardiac arrest
  - start high-quality compressions
  - defibrillate asynchronously with adequate energy
  - distinguish amiodarone context from non-shockable PEA
  - begin post-ROSC stabilization after conversion
debrief_questions:
  - Was VF recognized as shockable?
  - Were compressions started before shock?
  - Was shock energy adequate for weight?
  - Was amiodarone used in a shockable context?
  - Was post-ROSC physiology reassessed after conversion?
