name: shockable_vf_arrest_child_v1_31
description: "Educational v3.1 scenario: sudden shockable VF arrest with CPR, defibrillation, amiodarone context and post-ROSC stabilization."
version: v3.1-step4.35
patient:
  profile: child_20kg
  age_y: 7.0
  weight_kg: 20.0
  sex: M
  diagnosis: sudden shockable ventricular fibrillation arrest
simulation_time_s: 420
airway_interface:
  interface: SIMPLE_MASK
  intubated: false
  ventilator_connected: false
  airway_pressure_delivery_enabled: false
  oxygen_interface: SIMPLE_MASK
  oxygen_flow_L_min: 10.0
  oxygen_FiO2_set: 0.60
respiratory:
  mode: SPONT
  FiO2: 0.60
  PEEP: 0.0
  RR: 18
  Vt: 150
  C_rs: 0.95
  R_rs: 7.0
  SaO2: 0.95
  PaO2: 82.0
  PaCO2: 42.0
cardiovascular:
  HR: 128
  MAP: 62
  CO: 3.0
