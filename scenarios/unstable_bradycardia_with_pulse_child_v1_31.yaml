    label: unstable bradycardia with pulse
clinical_narrative: A child develops unstable bradycardia with a pulse. Learners should confirm pulse, avoid treating it as shockable arrest, support oxygenation and perfusion, and use atropine in the correct bradycardia context.
decision_focus:
  - confirm pulse before arrest treatment
  - recognize unstable bradycardia as pulsed rhythm
  - avoid asynchronous defibrillation
  - avoid arrest-only epinephrine framing
  - use atropine in the bradycardia context
debrief_questions:
  - Was a pulse checked before choosing RCP or shock?
  - Was the rhythm classified as pulsed unstable bradycardia?
  - Was atropine used in the appropriate context?
  - Were shock and arrest-only drug choices avoided?
  - Did HR and perfusion improve after atropine?
