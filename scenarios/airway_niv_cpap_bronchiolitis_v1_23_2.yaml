  NIV_leak_fraction: 0.30
  mask_leak_fraction: 0.30
  note: v1.23.2 NIV CPAP bronchiolitis base
respiratory:
  mode: CPAP
  FiO2: 0.45
  PEEP: 7.0
  RR: 42
