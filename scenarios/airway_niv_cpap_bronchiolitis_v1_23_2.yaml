clinical_narrative: An infant with bronchiolitis is escalated from oxygen/HFNC-like support to non-invasive CPAP. The scenario verifies that the patient is not intubated while receiving mask-delivered distending pressure.
debrief_questions:
- Which variables distinguish NIV CPAP from invasive ventilation?
- How does mask leak reduce delivered pressure and FiO2 in this educational model?
- Which variables suggest NIV failure risk?
