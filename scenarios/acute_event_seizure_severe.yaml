name: tbi_icp_management__event_seizure_severe
description: "TBI moderato-severo in bambino 8 anni 25 kg. ICP elevata, gestione multimodale:\n\
  \  - Osmoterapia (t=60s)\n  - Iperventilazione moderata PaCO2\u219235 (t=120s)\n\
  \  - Desametasone (t=0 in corso)\n  - Noradrenalina per mantenere CPP > 50 mmHg\n\
  \  - Glucosio monitorato (iperglicemia da stress)\n  - Coagulazione: CID lieve da\
  \ danno tissutale\n\n\nInjected acute event v0.43: seizure/severe at t=180.0s."
