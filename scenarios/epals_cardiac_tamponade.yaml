expected_response:
- Low-output obstructive shock pattern with high CVP and low MAP/CO.
- Drainage proxy lowers CVP and improves CO/MAP before lactate normalizes.
debrief_questions:
- What differentiates tamponade from distributive shock in this trace?
- Why can lactate lag behind mechanical relief of obstruction?
