expected_response:
- Low CO/MAP with lactate rise suggests pump failure physiology.
- Inotropy/afterload strategy improves CO/MAP before complete lactate recovery.
debrief_questions:
- Why is this not primarily hypovolaemic shock?
- Which endpoints should improve first after inotropy?
