outputs:
- SaO2
- PaO2
- PaCO2
- HR
- MAP
- Paw
- PEEP
- FiO2
- FiO2_delivered
- RR_total
- Vt
- lactate
- airway_interface
- oxygen_interface
- vent_mode
- airway_event_type
- airway_rescue_state
