name: counterfactual_asthma_high_RR_airtrapping
version: '0.42'
description: 'Counterfactual asthma: excessive ventilator RR/short expiratory time.
  Expected: air trapping/dynamic hyperinflation/auto-PEEP increase and gas exchange/hemodynamics
  worsen.'
patient:
  profile: adolescent_50kg
  age_y: 8
  weight_kg: 30
  sex: M
  diagnosis: severe_status_asthmaticus
respiratory:
  PEEP: 5
  Paw: 25
  FiO2: 0.5
  RR: 30
  C_rs: 0.85
  R_rs: 10.0
  PaO2: 82.0
  PaCO2: 55.0
  SaO2: 0.93
  non_recruitable_frac: 0.03
ventilator:
  mode: PCV
  IE_ratio: 0.5
  Pinsp: 20
  T_rise_s: 0.06
  alarm_Ppeak_max: 42
airway:
  bronchospasm_index: 0.72
  mucus_load: 0.24
  small_airway_obstruction: 0.35
cardiovascular:
  HR: 140
  MAP: 72
  CVP: 6
  Hb: 12.0
metabolism:
  T_core: 37.5
  VO2: 145
  lactate: 2.0
drugs:
  ketamine_mg_kg_h: 0.6
perturbations:
- t: 20
  action: set_RR
  value: 34
  label: excess RR
- t: 20
  action: set_IE
  value: 0.55
  label: short expiratory time
- t: 120
  action: set_RR
  value: 40
  label: further RR increase
- t: 120
  action: set_IE
  value: 0.6
  label: very short expiration
outputs:
- airway_obstruction_index
- bronchospasm_index
- bronchodilator_effect
- R_rs
- auto_PEEP
- auto_PEEP_obstructive
- air_trapping_index
- dynamic_hyperinflation
- airway_VdVt_add
- PaCO2
- PaO2
- SaO2
- pH_a
- Vt
- RR_total
- MAP
- CO
- RV_afterload_index
limitations:
- Qualitative educational scenario, not a validated pediatric asthma model.
- Bronchodilator effects are heuristic and should not be interpreted as dosing guidance.
- Regional ventilation heterogeneity is represented only by lumped resistance/dead-space
  modifiers.
- This scenario represents severe but not near-fatal asthma; use near_fatal_status_asthmaticus
  for peri-arrest physiology.
simulation_time_s: 360
counterfactual: true
