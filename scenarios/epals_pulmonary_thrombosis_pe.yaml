expected_response:
- PVR/RV afterload and dead-space burden rise before recovery.
- Oxygenation improves only partially until perfusion mismatch improves.
debrief_questions:
- Why can CO fall in a primarily pulmonary vascular event?
- Which variable suggests dead space rather than pure shunt?
outputs:
- PVR
- PAP_mean
- RV_afterload_index
- CO
- MAP
- CVP
- SaO2
- PaO2
- PaCO2
- vq_deadspace_frac
- vq_high_vq_burden
- airway_VdVt_add
- lactate
limitations:
- Educational scenario for emergency physiology training only.
- Not calibrated for patient-specific prediction or clinical decision support.
- Intervention events are simplified physiology proxies for reversible-cause teaching, not treatment protocols.
- No explicit clot burden or anticoagulation module is implemented; pulmonary thrombosis is represented by PVR/dead-space
  proxies.
simulation_time_s: 380
