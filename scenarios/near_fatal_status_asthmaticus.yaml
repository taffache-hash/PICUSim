name: near_fatal_status_asthmaticus
version: 0.36
description: >
  Bambino 8 anni, 30 kg, status asmatico near-fatal/peri-arrest.
  Mantiene intenzionalmente ipercapnia severa e acidemia marcata. Scenario
  ad alta gravità per debriefing avanzato; non deve essere usato come
  benchmark dello status asmatico severo didatticamente stabile.

patient:
  profile: adolescent_50kg
  age_y: 8
  weight_kg: 30
  sex: M
  diagnosis: near_fatal_status_asthmaticus

respiratory:
  PEEP: 5
  Paw: 18
  FiO2: 0.50
  RR: 18
  C_rs: 0.85
  R_rs: 10.0
  PaO2: 78.0
  PaCO2: 58.0
  SaO2: 0.92
  non_recruitable_frac: 0.03

ventilator:
  mode: PCV
  IE_ratio: 0.28      # expiratory-time preserving strategy
  Pinsp: 13
  T_rise_s: 0.06
  alarm_Ppeak_max: 42

airway:
  bronchospasm_index: 0.88
  mucus_load: 0.30
  small_airway_obstruction: 0.45

cardiovascular:
  HR: 145
  MAP: 72
  CVP: 6
  Hb: 12.0

metabolism:
  T_core: 37.6
  VO2: 175
  lactate: 2.4

drugs:
  ketamine_mg_kg_h: 0.8

perturbations:
  - {t: 30, action: set_salbutamol, value: 0.18, label: "continuous salbutamol"}
  - {t: 30, action: set_ipratropium, value: 10.0, label: "ipratropium"}
  - {t: 60, action: set_magnesium, value: 35.0, label: "magnesium infusion"}
  - {t: 90, action: set_ketamine, value: 1.2, label: "ketamine bronchodilation/sedation"}
  - {t: 180, action: set_RR, value: 14, label: "reduce RR to allow expiration"}
  - {t: 180, action: set_IE, value: 0.24, label: "longer expiratory time"}

outputs:
  - airway_obstruction_index
  - bronchospasm_index
  - bronchodilator_effect
  - R_rs
  - auto_PEEP
  - auto_PEEP_obstructive
  - air_trapping_index
  - dynamic_hyperinflation
  - airway_VdVt_add
  - PaCO2
  - PaO2
  - SaO2
  - pH_a
  - Vt
  - RR_total
  - MAP
  - CO
  - RV_afterload_index

limitations:
  - Qualitative near-fatal asthma scenario; severe hypercapnia/acidemia are intentional.
  - Not a validated predictor of pediatric asthma outcomes.
  - Use status_asthmaticus for the severe but non-peri-arrest teaching scenario.

simulation_time_s: 360
