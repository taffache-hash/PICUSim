  group: H
  cause: hypovolaemia
  reversible_cause: Hypovolaemia / hemorrhagic shock
  teaching_level: intermediate
clinical_narrative: Eight-year-old child with hemorrhagic hypovolaemic shock physiology. Low preload, falling oxygen
  delivery and rising lactate are treated with haemorrhage control, fluid and blood-product proxies.
