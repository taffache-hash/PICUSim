expected_response:
- MAP and DO2 reach nadir during bleeding and improve after haemorrhage control plus volume/blood support.
- Lactate rise slows after oxygen delivery improves.
debrief_questions:
- Was the main shock mechanism preload, pump or vasodilation?
- Why is vasopressor-alone an incomplete response to haemorrhage?
outputs:
- MAP
- HR
- CO
- SV
- CVP
- Hb
- DO2
- lactate
- fluid_balance
- bleeding_rate_mL_h
- oxygen_transport_reserve
- heme_severity_score
- INR
- PLT_count
limitations:
- Educational scenario for emergency physiology training only.
- Not calibrated for patient-specific prediction or clinical decision support.
- Intervention events are simplified proxies for physiology reversal, not treatment protocols.
