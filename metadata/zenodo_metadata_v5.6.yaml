description: >-
  PICUSim / Pediatric Critical Care Sim is a modular pediatric critical-care physiology simulation framework
  for education, scenario design, in-silico research prototyping, software testing and hypothesis generation.
  The release-candidate package includes physiological and pharmacological modules, YAML clinical scenarios,
  a local FastAPI backend, a browser-based training console, validation-support artifacts, regression reports,
  reproducibility outputs and publication-readiness documentation. This software is not a medical device and
  is not for clinical use, diagnosis, treatment, prescribing, triage, bedside monitoring, prognostication,
  device control, patient-specific modelling or patient-care decisions.
