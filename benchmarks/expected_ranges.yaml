# v0.27 quantitative benchmark fixtures.
# These are internal plausibility/regression envelopes, not clinical validation.
# Simulations are evaluated at the final snapshot using dt=1.0 unless specified.
healthy_child_20kg:
  max_time_s: 300
  ranges:
    MAP: [55, 85]
    HR: [70, 140]
    PaO2: [60, 110]
    PaCO2: [30, 48]
    pH_a: [7.30, 7.50]
    CO: [2.5, 6.0]
    Vt: [80, 220]
    SaO2: [0.90, 1.00]
    T_core: [36.5, 37.5]
